<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Control de Pedidos — Adidas Seller</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Dashboard: KPIs + chips de acción -->
  <header id="dashboard">

    <!-- Fila 1: brand + métricas principales -->
    <div class="kpi-bar">
      <div class="kpi-brand">
        <span class="kpi-logo">adidas</span>
        <span class="kpi-title">Centro de Control · Pedidos Seller</span>
      </div>
      <div class="kpi-metrics">
        <div class="kpi-item kpi-acciones">
          <span class="kpi-label">Acciones pendientes</span>
          <span class="kpi-value" id="kpi-total">—</span>
        </div>
        <div class="kpi-item kpi-sistema">
          <span class="kpi-label">En sistema</span>
          <span class="kpi-value" id="kpi-sistema">—</span>
        </div>
        <div class="kpi-item kpi-alta">
          <span class="kpi-label">Prioridad Alta</span>
          <span class="kpi-value" id="kpi-alta">—</span>
        </div>
        <div class="kpi-item kpi-media">
          <span class="kpi-label">Prioridad Media</span>
          <span class="kpi-value" id="kpi-media">—</span>
        </div>
        <div class="kpi-item">
          <span class="kpi-label">Datos</span>
          <span class="kpi-value kpi-ts" id="kpi-ts">—</span>
        </div>
      </div>
    </div>

    <!-- Fila 2: desglose por tipo de acción (#2) -->
    <div class="action-chips-bar">
      <div id="action-chips"></div>
    </div>

  </header>

  <!-- Warning fuentes vacías (#6) -->
  <div id="source-warnings" class="source-warnings" style="display:none"></div>

  <!-- Filtros sticky -->
  <section id="filters">
    <div class="filter-bar">
      <input  type="search" id="search-input"
              placeholder="Buscar por Order ID…" class="filter-search">
      <select id="filter-priority"    class="filter-select">
        <option value="">Todas las prioridades</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>
      <select id="filter-responsible" class="filter-select">
        <option value="">Todos los responsables</option>
        <option value="Equipo PIM">Equipo PIM</option>
        <option value="Ambos equipos">Ambos equipos</option>
        <option value="Adidas">Adidas</option>
      </select>
      <span id="filter-count" class="filter-count"></span>

      <!-- #4 Exportar CSV -->
      <button class="btn-secondary" onclick="App.exportCSV()">Exportar CSV</button>
      <button id="btn-refresh" class="btn-primary" onclick="App.load(true)">Actualizar datos</button>
    </div>
  </section>

  <!-- Tabla operativa -->
  <main id="table-container">
    <div id="loading" class="loading-state">Cargando pedidos…</div>
    <div id="empty"   class="empty-state" style="display:none">
      Sin resultados para los filtros aplicados.
    </div>
    <table id="orders-table" style="display:none">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>PIM</th>
          <th>VTEX</th>
          <th>Entregado</th>
          <th>TMS</th>
          <th>Acción sugerida</th>
          <th>Responsable</th>
          <th>Prioridad</th>
        </tr>
      </thead>
      <tbody id="orders-tbody"></tbody>
    </table>
  </main>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/table.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
