<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centro de Control de Pedidos — Adidas Seller</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Dashboard: KPIs + chips de acción -->
  <header id="dashboard">

    <!-- Fila 1: brand + métricas principales -->
    <div class="kpi-bar">
      <div class="kpi-brand">
        <span class="kpi-logo">adidas</span>
        <span class="kpi-title">Centro de Control · Pedidos Seller</span>
      </div>
      <div class="kpi-metrics">
        <div class="kpi-item kpi-acciones">
          <span class="kpi-label">Acciones pendientes</span>
          <span class="kpi-value" id="kpi-total">—</span>
        </div>
        <div class="kpi-item kpi-sistema">
          <span class="kpi-label">En sistema</span>
          <span class="kpi-value" id="kpi-sistema">—</span>
        </div>
        <div class="kpi-item kpi-alta">
          <span class="kpi-label">Prioridad Alta</span>
          <span class="kpi-value" id="kpi-alta">—</span>
        </div>
        <div class="kpi-item kpi-media">
          <span class="kpi-label">Prioridad Media</span>
          <span class="kpi-value" id="kpi-media">—</span>
        </div>
        <div class="kpi-item">
          <span class="kpi-label">Datos</span>
          <span class="kpi-value kpi-ts" id="kpi-ts">—</span>
        </div>
      </div>
    </div>

    <!-- Fila 2: desglose por tipo de acción (#2) -->
    <div class="action-chips-bar">
      <div id="action-chips"></div>
    </div>

  </header>

  <!-- Warning fuentes vacías (#6) -->
  <div id="source-warnings" class="source-warnings" style="display:none"></div>

  <!-- Filtros sticky -->
  <section id="filters">
    <!-- Fila 1: búsqueda + prioridad + responsable + acciones -->
    <div class="filter-bar">
      <input type="search" id="search-input"
             placeholder="Buscar por Order ID…" class="filter-search">
      <select id="filter-priority" class="filter-select">
        <option value="">Todas las prioridades</option>
        <option value="Alta">Alta</option>
        <option value="Media">Media</option>
        <option value="Baja">Baja</option>
      </select>
      <select id="filter-responsible" class="filter-select">
        <option value="">Todos los responsables</option>
        <option value="Equipo PIM">Equipo PIM</option>
        <option value="Ambos equipos">Ambos equipos</option>
        <option value="Adidas">Adidas</option>
      </select>
      <span id="filter-count" class="filter-count"></span>
      <button class="btn-secondary" onclick="App.exportCSV()">Exportar CSV</button>
      <button id="btn-refresh" class="btn-primary" onclick="App.load(true)">Actualizar datos</button>
    </div>
    <!-- Fila 2: estado por fuente + acción sugerida + guía -->
    <div class="filter-bar filter-bar--states">
      <select id="filter-pim" class="filter-select">
        <option value="">PIM: todos</option>
        <option value="ACTIVO">ACTIVO</option>
        <option value="FACTURADO">FACTURADO</option>
        <option value="COLA_FACTURACION">COLA FACTURACIÓN</option>
        <option value="DESPACHADO">DESPACHADO</option>
      </select>
      <select id="filter-vtex" class="filter-select">
        <option value="">VTEX: todos</option>
        <option value="FACTURADO">FACTURADO</option>
        <option value="CANCELADO">CANCELADO</option>
        <option value="PAGAMENTO_APROBADO">PAGO APROBADO</option>
      </select>
      <select id="filter-delivered" class="filter-select">
        <option value="">Entregado VTEX: todos</option>
        <option value="true">Sí</option>
        <option value="false">No</option>
      </select>
      <select id="filter-tms" class="filter-select">
        <option value="">TMS: todos</option>
        <option value="ENTREGADO">ENTREGADO</option>
        <option value="EN_TRANSITO">EN TRÁNSITO</option>
        <option value="NO_ENTREGADO">NO ENTREGADO</option>
      </select>
      <select id="filter-action" class="filter-select filter-select--wide">
        <option value="">Acción: todas</option>
      </select>
      <button class="btn-guide" onclick="App.openGuide()">? Guía de acciones</button>
    </div>
  </section>

  <!-- Tabla operativa -->
  <main id="table-container">
    <div id="loading" class="loading-state">Cargando pedidos…</div>
    <div id="empty"   class="empty-state" style="display:none">
      Sin resultados para los filtros aplicados.
    </div>
    <table id="orders-table" style="display:none">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>PIM</th>
          <th>VTEX</th>
          <th title="Delivered en VTEX — debe coincidir con Estado TMS">Entregado VTEX</th>
          <th>TMS</th>
          <th>Acción sugerida</th>
          <th>Responsable</th>
          <th>Prioridad</th>
        </tr>
      </thead>
      <tbody id="orders-tbody"></tbody>
    </table>
  </main>

  <!-- Modal guía de acciones -->
  <div id="guide-overlay" class="guide-overlay" onclick="App.closeGuide()" style="display:none">
    <div class="guide-modal" onclick="event.stopPropagation()">
      <div class="guide-header">
        <span class="guide-title">Guía de acciones operativas</span>
        <button class="guide-close" onclick="App.closeGuide()">✕</button>
      </div>
      <div class="guide-body" id="guide-body"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/table.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/export.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
